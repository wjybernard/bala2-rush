<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Bala2 Rush</title>

<!-- ===== PWA: biar bisa di-install jadi app di HP ===== -->
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#8a5a2b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bala2 Rush">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="icon" href="./favicon.png" type="image/png">
<script>
  // daftarin service worker -> game jalan OFFLINE
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    });
  }
  // kunci layar ke portrait kalau HP-nya ngizinin.
  // Di desktop (Windows) ini bisa THROW langsung, bukan cuma reject -> harus try/catch,
  // kalau enggak script-nya mati duluan dan game gak jalan sama sekali.
  try {
    if (screen.orientation && typeof screen.orientation.lock === "function") {
      const p = screen.orientation.lock("portrait");
      if (p && typeof p.catch === "function") p.catch(() => {});
    }
  } catch (e) { /* desktop / gak didukung — abaikan */ }
</script>
<style>
  :root{
    --bg1:#2a1810; --bg2:#3d2416; --panel:#fff6e6; --panel2:#ffe9c2;
    --wood:#8a5a2b; --wood2:#a06a34; --accent:#e8721c; --accent2:#ffb100;
    --good:#3fae5a; --bad:#e23c3c; --ink:#3a2410; --muted:#8a6f52;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;
    -webkit-user-select:none;user-select:none;             /* Android lama & Samsung Internet */
    font-family:'Segoe UI',system-ui,-apple-system,Roboto,sans-serif;}
  /* teks di kartu tetep bisa dibaca/di-select-free, tapi jangan ada highlight biru pas nge-tap */
  html,body{margin:0;height:100%;overflow:hidden;background:radial-gradient(circle at 50% 0%,var(--bg2),var(--bg1));color:var(--ink);touch-action:none;
    -webkit-text-size-adjust:100%;text-size-adjust:100%;-webkit-tap-highlight-color:transparent;}
  /* pakai dvh biar gak ketutupan address bar HP (Samsung/Chrome) */
  #game{position:fixed;inset:0;display:flex;flex-direction:column;max-width:940px;margin:0 auto;
    height:100vh;height:100dvh;height:var(--appvh,100dvh);overflow:hidden;}

  /* safe-area: biar gak ketiban notch / status bar pas mode app */
  .topbar{display:flex;gap:6px;align-items:center;color:#fff2dd;flex-wrap:wrap;
    padding:6px 8px;padding-top:calc(6px + env(safe-area-inset-top,0px));
    background:linear-gradient(var(--wood2),var(--wood));}
  .field{padding-bottom:calc(8px + env(safe-area-inset-bottom,0px));}
  .stat{background:#00000030;border-radius:10px;padding:4px 9px;font-weight:700;font-size:14px;display:flex;gap:4px;align-items:center;white-space:nowrap;}
  .stat small{opacity:.8;}
  .daylabel{font-weight:800;font-size:15px;}
  .clock{margin-left:auto;background:#00000045;font-variant-numeric:tabular-nums;}
  .clock.rush{background:var(--accent);animation:pulse .6s infinite alternate;}
  #comboStat{background:#c0392b;}
  .progwrap{flex:1 1 100%;height:8px;background:#00000035;border-radius:6px;overflow:hidden;margin-top:2px;}
  .progbar{height:100%;width:0;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width .2s;}
  @keyframes pulse{to{transform:scale(1.06)}}

  /* banners stack, never overlap */
  #banners{display:flex;flex-direction:column;}
  .banner{display:flex;align-items:center;justify-content:center;gap:8px;padding:6px 10px;font-weight:800;font-size:14px;color:#fff;flex-wrap:wrap;}
  .banner.rush{background:linear-gradient(90deg,var(--accent),var(--accent2));}
  .banner.fuse{background:#c0261c;animation:fuseFlash .5s infinite alternate;}
  @keyframes fuseFlash{to{background:#7d130f}}
  /* maling Trinkgeld: jalan mendekat, harus diklik */
  .thiefLane{position:relative;height:74px;margin:0 4px;flex:none;}
  .tipjar{position:absolute;right:4px;bottom:10px;text-align:center;line-height:1;}
  .tipjar .tj{display:block;font-size:9px;font-weight:800;color:#ffd9a0;letter-spacing:.5px;}
  .tipjar .tjAmt{display:block;font-size:11px;font-weight:900;color:#fff;background:#00000055;
    border-radius:6px;padding:0 5px;margin-top:1px;white-space:nowrap;}
  .tipjar.grab{animation:jarShake .18s infinite;}
  @keyframes jarShake{0%,100%{transform:translateX(0)}50%{transform:translateX(-3px) rotate(-8deg)}}
  .thief{position:absolute;bottom:14px;left:0;cursor:pointer;user-select:none;
    filter:drop-shadow(0 3px 4px #0008);padding:4px;}
  .thief .body{display:inline-block;animation:sneak .32s infinite alternate;}
  @keyframes sneak{from{transform:translateY(0) rotate(-4deg)}to{transform:translateY(-5px) rotate(4deg)}}
  .thief .slap{position:absolute;left:-6px;top:-14px;font-size:34px;opacity:0;transform:rotate(-25deg) scale(.5);}
  .thief.hit .body{animation:none;transform:rotate(70deg) translateY(6px);filter:brightness(.8);}
  .thief.hit .slap{animation:slapIn .28s ease-out;}
  @keyframes slapIn{0%{opacity:0;transform:translate(-18px,-22px) rotate(-40deg) scale(.6)}
    45%{opacity:1;transform:translate(4px,2px) rotate(6deg) scale(1.25)}
    100%{opacity:0;transform:translate(6px,6px) rotate(10deg) scale(1)}}
  .thiefWarn{position:absolute;bottom:44px;font-size:11px;font-weight:800;color:#fff;background:#c0261c;
    padding:1px 6px;border-radius:6px;white-space:nowrap;transform:translateX(-6px);}
  .fuseBtn{border:none;border-radius:8px;padding:6px 16px;font-weight:800;background:#ffd23f;color:#5a2a00;cursor:pointer;box-shadow:0 2px 0 #0005;}
  .fuseBtn:active{transform:translateY(1px);}

  .field{flex:1;min-height:0;display:flex;flex-direction:column;gap:8px;padding:8px;overflow:hidden;position:relative;}
  /* JANGAN di-scroll: antrean maks 8 -> selalu muat 2 baris x 4 kartu */
  .customers{flex:1 1 auto;min-height:70px;background:#00000022;border-radius:14px;padding:8px;position:relative;z-index:1;
    display:flex;gap:8px;flex-wrap:nowrap;justify-content:flex-start;overflow:hidden;}
  .stations{flex:0 0 auto;}
  .thiefLane{flex:0 0 auto;}
  .cust{flex:1 1 0;min-width:0;max-width:calc(25% - 6px);background:var(--panel);border-radius:12px;padding:6px;box-shadow:0 3px 0 #0003;position:relative;animation:pop .25s;cursor:pointer;user-select:none;border:2px solid transparent;}
  .cust:active{transform:scale(.95);}
  .cust.can{border-color:var(--good);}
  .cust .bubble{background:#fff;border:1.5px solid #0002;border-radius:10px;padding:3px 5px;font-size:9.5px;font-weight:700;line-height:1.15;text-align:center;margin-bottom:5px;position:relative;min-height:26px;display:flex;align-items:center;justify-content:center;}
  .cust .bubble:after{content:"";position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#fff;}
  .cust .face{width:100%;max-width:30px;margin:0 auto;line-height:0;}
  .cust .face svg{width:100%;height:auto;display:block;}
  .cust .order{font-size:13px;font-weight:800;text-align:center;margin:3px 0;}
  .cust .tags{display:flex;gap:3px;justify-content:center;flex-wrap:wrap;font-size:10px;min-height:0;}
  .tag{background:var(--panel2);border-radius:6px;padding:1px 5px;font-weight:700;}
  .tag.kacang{background:#f0e0c0;color:#8a5a1c;}
  .tag.buru{background:#fff0c2;color:#b8860b;}
  .tag.borongan{background:#e2d5ff;color:#5b3a99;}
  .tag.kapal{background:#ffe08a;color:#7a4a00;}
  .cust.kapal{border-color:#ffc83d;box-shadow:0 0 0 2px #ffc83d,0 3px 0 #0003;background:linear-gradient(#fffdf3,#fff6d9);}
  .cust.kapal.can{border-color:var(--good);}
  .pat{height:6px;background:#0002;border-radius:4px;margin-top:4px;overflow:hidden;}
  .patbar{height:100%;width:100%;background:var(--good);}
  .floatp{position:absolute;left:50%;top:0;transform:translateX(-50%);font-weight:800;font-size:16px;pointer-events:none;animation:floatUp 1s forwards;z-index:6;}
  @keyframes floatUp{to{transform:translate(-50%,-42px);opacity:0}}

  .stations{display:flex;gap:8px;}
  .panel{background:linear-gradient(var(--panel),var(--panel2));border-radius:14px;padding:8px;box-shadow:0 3px 0 #0003;display:flex;flex-direction:column;gap:6px;}
  .panel h3{margin:0;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:flex;justify-content:space-between;gap:6px;}
  .wajan{flex:1;position:relative;}
  /* animasi nuang minyak */
  .pourFx{position:absolute;left:0;right:0;top:24px;height:84px;z-index:6;pointer-events:none;
    display:flex;flex-direction:column;align-items:center;justify-content:flex-start;}
  .pourFx .can{font-size:28px;line-height:1;transform-origin:60% 60%;animation:canTilt .3s ease-out forwards;}
  .pourFx .stream{width:8px;height:34px;border-radius:0 0 5px 5px;
    background:linear-gradient(180deg,#ffd75e,#f6c445 40%,#e0a52a);
    box-shadow:0 0 6px #f6c44577;
    transform-origin:top;animation:streamDown .25s ease-out forwards;}
  .pourFx .splash{width:46px;height:11px;margin-top:-3px;border-radius:50%;
    background:radial-gradient(ellipse,#ffd75eaa,#f6c44533 70%,transparent);
    animation:splashPulse .4s infinite alternate;}
  @keyframes canTilt{from{transform:rotate(0)}to{transform:rotate(-42deg)}}
  @keyframes streamDown{from{transform:scaleY(0)}to{transform:scaleY(1)}}
  @keyframes splashPulse{from{transform:scale(.8);opacity:.55}to{transform:scale(1.15);opacity:1}}
  .slots{display:grid;grid-template-columns:repeat(auto-fill,minmax(46px,1fr));gap:6px;}
  /* keranjang Fritteuse: kotak berjaring, bukan wajan bulat */
  .slot{aspect-ratio:1;position:relative;cursor:pointer;user-select:none;container-type:inline-size;}
  .slot .fry{position:absolute;inset:0;width:100%;height:100%;display:block;pointer-events:none;}
  .slot .oil{position:absolute;left:50%;top:42%;transform:translate(-50%,-50%);width:66%;height:60%;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:1;}
  /* ===== ikon & karakter SVG (flat vector) ===== */
  .ic{width:16px;height:16px;vertical-align:-3px;flex:none;}
  .ic.big{width:22px;height:22px;vertical-align:-5px;}
  .av{width:100%;height:auto;display:block;}          /* wajah pembeli */
  .jarIc{width:30px;height:30px;display:block;margin:0 auto;}
  .jerIc{width:26px;height:26px;display:block;margin:0 auto;}
  .thiefIc{width:40px;height:44px;display:block;}
  .newsIc{width:76px;height:84px;display:block;margin:0 auto;}
  .char .who svg,.char svg.who{width:44px;height:48px;}

  /* bala2 digambar pakai CSS: kuning keemasan + bintik kol & wortel */
  .bala{display:inline-block;width:1em;height:1em;position:relative;vertical-align:-.16em;
    border-radius:52% 48% 50% 50%/50% 52% 48% 50%;
    background:radial-gradient(circle at 34% 28%,#ffe27a 0%,#f6c445 45%,#e0a52a 78%,#c98d1c 100%);
    box-shadow:inset -2px -2px 4px #b8790d55, 0 1px 2px #0004;}
  .bala:after{content:"";position:absolute;inset:0;border-radius:inherit;
    background:
      radial-gradient(circle at 26% 66%,#5aab3f 0 13%,transparent 14%),
      radial-gradient(circle at 71% 41%,#f2843c 0 11%,transparent 12%),
      radial-gradient(circle at 57% 78%,#3f8c33 0 9%,transparent 10%),
      radial-gradient(circle at 44% 45%,#e8963a 0 7%,transparent 8%);}
  .bala.sm{width:15px;height:15px;}
  .slot .em{font-size:36cqw;opacity:.28;}
  .slot.cooking .em{opacity:1;}
  .slot.cooking .em{filter:saturate(.75) brightness(1.08);}   /* masih pucat */
  .slot.ready .fry{filter:drop-shadow(0 0 4px #3fae5a);}
  .slot.ready .em{opacity:1;filter:saturate(1.15);animation:bounce .5s infinite alternate;}
  .slot.burnt .em{opacity:1;filter:brightness(.45) saturate(.5) sepia(.5);}
  .slot.immune::after{content:"🔌";position:absolute;top:1px;right:2px;font-size:10px;line-height:1;z-index:3;filter:drop-shadow(0 1px 0 #0006);}
  .slot.off .fry{filter:grayscale(1) brightness(.4);}
  .slot.off .em{filter:brightness(.25);}
  .slot.off:after{content:"⚡";position:absolute;font-size:20px;animation:flick .5s infinite alternate;}
  @keyframes flick{from{opacity:.35}to{opacity:1}}
  @keyframes bounce{to{transform:translateY(-4px)}}
  .ring{position:absolute;inset:0;border-radius:50%;}
  .lbl{position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);font-size:8px;font-weight:800;padding:0 3px;border-radius:4px;white-space:nowrap;}
  .lbl.ready{background:var(--good);color:#fff;}
  .lbl.burnt{background:var(--bad);color:#fff;}
  .slots.dropok{outline:3px dashed var(--good);outline-offset:3px;border-radius:10px;}
  #pegawai{position:absolute;right:2px;top:-30px;width:33px;height:40px;display:none;z-index:6;pointer-events:none;transform-origin:bottom center;filter:drop-shadow(0 2px 2px #0003);}
  #pegawai svg{width:100%;height:100%;display:block;}
  #pegawai.press{animation:pegPress .34s ease;}
  @keyframes pegPress{0%{transform:translateY(0) rotate(0)}42%{transform:translateY(5px) rotate(7deg)}100%{transform:translateY(0) rotate(0)}}
  #collect.ptap{animation:btnTap .3s ease;}
  @keyframes btnTap{45%{filter:brightness(1.4)}}
  #standDeco{display:none;}
  #standDeco .deco{position:absolute;display:none;filter:drop-shadow(0 2px 2px #0004);}
  #standDeco .deco svg{width:100%;height:auto;display:block;}
  #dAwning{top:44px;left:50%;transform:translateX(-50%);width:72px;}
  #dSpanduk{top:46px;left:6px;width:42px;}
  #dSpeaker{top:44px;right:6px;width:27px;}

  .side{width:172px;gap:8px;}
  /* min-width:0 WAJIB: tanpa ini, teks "menghangatkan… X%" (nowrap) bikin kartu
     nolak nyusut, jadi tiap % berubah lebarnya jitter -> layar keliatan gerak. */
  .res{background:#fff;border-radius:12px;padding:7px;display:flex;flex-direction:column;gap:5px;min-width:0;}
  .rh{display:flex;justify-content:space-between;align-items:center;font-weight:800;font-size:14px;}
  .rh .big{font-size:20px;}
  .bar{height:9px;background:#0001;border-radius:6px;overflow:hidden;}
  .bar>span{display:block;height:100%;width:100%;border-radius:6px;}
  .bar.ado>span{background:linear-gradient(90deg,#d9a441,#a86a1c);}
  .bar.sc>span{background:linear-gradient(90deg,#c99a4a,#8a5a1c);}
  .bar.oil>span{background:linear-gradient(90deg,#f2c200,#b58900);}
  /* tinggi DIKUNCI 1 baris. Kalau enggak, teks "HABIS" yg lebih panjang wrap
     ke 2 baris -> kartu minyak melar -> layout kegeser (layar keliatan goyang). */
  .statein{font-size:11px;color:var(--muted);font-weight:700;text-align:center;
    height:14px;line-height:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .statein.hot{color:var(--good);} .statein.cold{color:var(--bad);}
  button.act{border:none;border-radius:10px;padding:16px 8px;font-weight:800;font-size:16px;color:#fff;cursor:pointer;box-shadow:0 3px 0 #0004;background:var(--accent);width:100%;}
  button.act:active{transform:translateY(2px);box-shadow:0 1px 0 #0004;}
  button.act.blue{background:#3a7bd5;}
  button.act:disabled{opacity:.5;}

  /* Penghangat (drop target) */
  .warmer{width:120px;background:linear-gradient(#ffd98a,#f0b44c);border-radius:14px;padding:8px;box-shadow:0 3px 0 #0003;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:3px solid transparent;}
  .warmer.dropok{border-color:var(--good);transform:scale(1.04);}
  .warmer .t{font-size:11px;font-weight:800;color:#7a4a00;text-transform:uppercase;}
  .warmer .n{font-size:30px;font-weight:900;color:#5a3300;}
  .warmer .hint{font-size:9px;color:#7a4a00;text-align:center;line-height:1.1;}

  /* Jerigen minyak (drag source) */
  #jerigen{cursor:grab;text-align:center;background:#fff8e2;border-radius:10px;padding:4px;border:2px dashed #d0a94a;}
  #jerigen.lowpulse{animation:pulse .5s infinite alternate;border-color:var(--bad);}

  .ghost{position:fixed;font-size:34px;pointer-events:none;z-index:99;transform:translate(-50%,-50%);filter:drop-shadow(0 4px 6px #0007);}
  .coin{position:fixed;width:15px;height:15px;border-radius:50%;pointer-events:none;z-index:98;
    transition:transform .62s cubic-bezier(.34,.1,.42,1),opacity .62s;}
  .coin.gold{background:radial-gradient(circle at 35% 30%,#ffe895,#f6c445 55%,#cf9312);
    box-shadow:inset -1px -1px 2px #96660877,0 0 3px #f6c44599;}
  .coin.silver{background:radial-gradient(circle at 35% 30%,#ffffff,#dbe1e6 55%,#9aa4ad);
    box-shadow:inset -1px -1px 2px #6b747c77,0 0 3px #cfd6dc99;}
  #money.bump{animation:moneyBump .3s;}
  @keyframes moneyBump{0%,100%{transform:scale(1)}45%{transform:scale(1.35);color:#ffe27a}}
  .tipjar.plink{animation:plink .32s;}
  @keyframes plink{0%,100%{transform:scale(1)}40%{transform:scale(1.28) rotate(-5deg)}}

  /* Character */
  #charLayer{position:absolute;left:0;right:0;bottom:8px;display:flex;justify-content:center;pointer-events:none;z-index:7;}
  .char{display:flex;align-items:flex-end;gap:6px;animation:charIn .4s;}
  .char .who{font-size:46px;animation:bob .5s infinite alternate;}
  .char .say{background:#fff;border-radius:12px;padding:8px 12px;font-weight:700;font-size:13px;max-width:280px;box-shadow:0 4px 10px #0006;position:relative;}
  .char .say:after{content:"";position:absolute;left:-6px;bottom:12px;border:6px solid transparent;border-right-color:#fff;}
  @keyframes charIn{from{transform:translateX(-40px);opacity:0}to{transform:none;opacity:1}}
  @keyframes bob{to{transform:translateY(-5px)}}

  .overlay{position:fixed;inset:0;background:#1a0e07dd;display:flex;align-items:center;justify-content:center;padding:16px;z-index:20;}
  /* PENTING (Android): body pakai touch-action:none, jadi scroll sentuh di dalam
     kartu ke-blokir. Tanpa ini, toko & tutorial gak bisa di-scroll pakai jari.
     'manipulation' = scroll boleh, TAPI double-tap-to-zoom dimatiin. Wajib:
     Chrome Android NGEIGNORE user-scalable=no, jadi klik cepet 2x di bahan
     adonan bikin layar ke-zoom sendiri. */
  .card{background:linear-gradient(var(--panel),var(--panel2));border-radius:18px;padding:18px;
    max-width:460px;width:100%;box-shadow:0 8px 30px #000a;
    max-height:88vh;max-height:88dvh;overflow-y:auto;
    /* padding bawah ekstra + safe-area: kartu tinggi (mis. achievements) jangan
       naruh tombol tepat di pinggir bawah -> ketiban zona gesture HP -> gak bisa dipencet */
    padding-bottom:calc(18px + env(safe-area-inset-bottom, 0px));
    touch-action:manipulation;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
  .overlay{touch-action:manipulation;}
  /* overlay juga dikasih jarak aman bawah biar kartu gak nempel dasar layar */
  .overlay{padding-bottom:calc(16px + env(safe-area-inset-bottom, 0px));}
  .card h1{margin:.1em 0;font-size:25px;text-align:center;color:var(--accent);}
  .card h2{margin:.1em 0 .3em;text-align:center;font-size:19px;}
  .card p{text-align:center;margin:.4em 0;line-height:1.45;font-size:15px;}
  .bigbtn{display:block;width:100%;border:none;border-radius:12px;padding:14px;font-weight:800;font-size:18px;color:#fff;background:var(--accent);cursor:pointer;margin-top:10px;box-shadow:0 4px 0 #0004;}
  .bigbtn.green{background:var(--good);}
  .newsChar{font-size:64px;text-align:center;animation:bob .6s infinite alternate;}
  /* ===== tombol menu + setelan ===== */
  .menuBtn{background:#00000045;border:none;color:#fff2dd;font-size:18px;font-weight:800;
    border-radius:10px;padding:3px 10px;cursor:pointer;line-height:1.3;}
  .menuBtn:active{transform:scale(.92);}
  .setRow{display:flex;gap:8px;margin:10px 0;}
  .setBtn{flex:1;border:none;border-radius:10px;padding:11px 6px;font-weight:800;font-size:13px;
    cursor:pointer;box-shadow:0 3px 0 #0003;}
  .setBtn.on{background:var(--good);color:#fff;}
  .setBtn.off{background:#c9bda9;color:#5a4a35;}
  .setBtn:active{transform:translateY(2px);box-shadow:0 1px 0 #0003;}
  .volRow{display:flex;align-items:center;gap:10px;margin:8px 2px;}
  .volRow .vlbl{width:74px;font-weight:800;font-size:13px;color:#5a4a35;flex:none;}
  .volRow .vpct{width:38px;text-align:right;font-weight:800;font-size:12px;color:#7a6a52;flex:none;}
  input[type=range].vol{flex:1;-webkit-appearance:none;appearance:none;height:8px;border-radius:6px;
    background:#d8cdb8;outline:none;touch-action:manipulation;}
  input[type=range].vol::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:22px;height:22px;
    border-radius:50%;background:var(--good);border:2px solid #fff;box-shadow:0 2px 3px #0004;cursor:pointer;}
  input[type=range].vol::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:var(--good);

  .bigbtn.half{flex:1;}
  .starGain{text-align:center;font-weight:900;font-size:17px;color:#c9902a;margin:2px 0;
    animation:starPop .4s cubic-bezier(.2,1.4,.5,1);}
  @keyframes starPop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
  .tierUnlock{text-align:center;font-weight:900;font-size:14px;color:var(--good);margin-bottom:4px;}
  .starBal{text-align:center;font-size:15px;margin:2px 0 8px;}
  .perkList{display:flex;flex-direction:column;gap:8px;margin:6px 0;}
  .perk{display:flex;align-items:center;gap:9px;background:#fff8ea;border-radius:12px;padding:9px;border:2px solid #0001;}
  .perk.maxed{background:#eafaee;border-color:var(--good);}
  .perk .pIc{font-size:24px;flex:0 0 30px;text-align:center;}
  .perk .pInfo{flex:1;min-width:0;}
  .perk .pInfo b{font-size:13.5px;}
  .perk .pInfo>div{font-size:11px;color:var(--muted);font-weight:700;line-height:1.2;}
  .perk .pLvl{font-size:11px;font-weight:800;color:#c9902a;letter-spacing:1px;}
  .perk .pBuy{font:inherit;font-weight:900;font-size:13px;padding:8px 12px;border:0;border-radius:10px;
    background:#c9902a;color:#fff;cursor:pointer;box-shadow:0 3px 0 #0003;white-space:nowrap;touch-action:manipulation;}
  .perk .pBuy:disabled{background:#b9b3a5;box-shadow:none;cursor:not-allowed;}
  .perk .pBuy:active:not(:disabled){transform:translateY(2px);box-shadow:0 1px 0 #0003;}
  .perk .pCtrl{display:flex;flex-direction:column;gap:5px;align-items:stretch;flex:0 0 auto;}
  .perk .pOnOff{font:inherit;font-weight:900;font-size:11px;padding:5px 10px;border:0;border-radius:8px;
    cursor:pointer;box-shadow:0 2px 0 #0003;white-space:nowrap;touch-action:manipulation;min-width:58px;}
  .perk .pOnOff.on{background:var(--good);color:#fff;}
  .perk .pOnOff.off{background:#c9bda9;color:#5a4a35;}
  .perk .pOnOff:active{transform:translateY(1px);box-shadow:0 1px 0 #0003;}
  .perk.poff{opacity:.62;}
  .perk.poff .pIc{filter:grayscale(1);}

  /* ---------- papan skor + input nama ---------- */
  .bTitle{text-align:center;font-weight:900;font-size:14px;margin:12px 0 6px;color:#6b4a22;}
  .board{background:#fff8ea;border-radius:12px;padding:4px 6px;border:2px solid #0001;}
  .bEmpty{text-align:center;font-size:13px;color:var(--muted);padding:10px 4px;font-weight:700;}
  .bRow{display:flex;align-items:center;gap:8px;padding:7px 6px;font-size:14px;
    border-bottom:1px solid #0000000f;}
  .bRow:last-child{border-bottom:0;}
  .bRow.me{background:#eafaee;border-radius:8px;box-shadow:inset 0 0 0 2px var(--good);}
  .bPos{flex:0 0 22px;text-align:center;font-size:14px;}
  .bName{flex:1;min-width:0;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .bMeta{flex:0 0 auto;font-size:11px;color:var(--muted);font-weight:800;}
  .bScore{flex:0 0 auto;font-variant-numeric:tabular-nums;}
  .nameRow{display:flex;gap:8px;margin-top:4px;}
  .nameRow input{flex:1;min-width:0;font:inherit;font-weight:800;font-size:15px;
    padding:10px 12px;border-radius:10px;border:2px solid #0002;background:#fff;color:#3a2a18;
    touch-action:manipulation;}
  .nameRow input:focus{outline:none;border-color:var(--good);}
  .nameRow button{font:inherit;font-weight:900;font-size:14px;padding:10px 16px;border:0;
    border-radius:10px;background:var(--good);color:#fff;cursor:pointer;
    box-shadow:0 3px 0 #0003;touch-action:manipulation;}
  .nameRow button:active{transform:translateY(2px);box-shadow:0 1px 0 #0003;}
  .shop{display:flex;flex-direction:column;gap:8px;margin:10px 0;}
  .up{display:flex;align-items:center;gap:10px;background:#fff;border-radius:12px;padding:8px 10px;}
  .up .ic{font-size:24px;} .up .info{flex:1;} .up .info b{font-size:14px;}
  .up .info div{font-size:11px;color:var(--muted);}
  .up .lvl{font-size:11px;color:var(--muted);font-weight:700;}
  .up button{border:none;border-radius:9px;padding:8px 10px;font-weight:800;color:#fff;background:var(--good);cursor:pointer;min-width:78px;}
  .up button:disabled{background:#bbb;}
  .up.life{background:#fff0f0;border:2px solid #e23c3c;}
  .up.life button{background:#e23c3c;}
  .up.life button:disabled{background:#bbb;}

  .ingredients{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0;}
  /* Tinggi & lebar tiap kolom DIKUNCI. Kalau enggak, pas ✔ muncul barisnya
     ngembang -> grid reflow -> kartunya keliatan berubah ukuran tiap diklik. */
  .ing{display:flex;align-items:center;gap:8px;background:#fff;border-radius:12px;padding:0 9px;cursor:pointer;border:2px solid #0001;
    height:46px;box-sizing:border-box;overflow:hidden;
    touch-action:manipulation;-webkit-user-select:none;user-select:none;}
  .ing.done{border-color:var(--good);background:#eafaee;}
  .ing .ic{flex:0 0 20px;text-align:center;font-size:17px;line-height:1;}
  /* boleh turun ke baris ke-2 ("Bumbu basah" gak muat 1 baris di HP).
     Tinggi 46px cukup buat 2 baris @12px, jadi layout tetep gak geser. */
  .ing .nm{flex:1;min-width:0;font-weight:700;font-size:12px;line-height:1.15;
    white-space:normal;overflow-wrap:break-word;}
  /* slot centang selalu ada, cuma di-hide -> gak geser layout */
  .ing .ck{flex:0 0 16px;text-align:center;font-size:14px;line-height:1;color:var(--good);
    visibility:hidden;}
  .ing.done .ck{visibility:visible;}
  .mixbowl{font-size:70px;text-align:center;cursor:pointer;margin:6px 0;}
  .mixbowl:active{transform:scale(.9) rotate(-6deg);}
  .mixbar{height:22px;background:#0001;border-radius:12px;overflow:hidden;margin:8px 0;}
  .mixbar>span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent2),var(--accent));}

  @keyframes pop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
  .shake{animation:shake .3s;}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
  .shakeBig{animation:shakeBig .35s;}
  @keyframes shakeBig{0%,100%{transform:translate(0,0)}25%{transform:translate(-6px,3px)}75%{transform:translate(6px,-3px)}}

  @media(max-width:640px){
    .stations{flex-direction:column;gap:6px;}
    .side{width:auto;flex-direction:row;gap:6px;}
    .side .res{flex:1;padding:5px;gap:3px;}
    .warmer{width:auto;flex-direction:row;justify-content:space-around;align-items:center;padding:5px;gap:8px;}
    .warmer .n{font-size:24px;}
    .field{gap:6px;padding:6px;}

    /* kartu pembeli diringkas biar keliatan utuh (4 per baris, gak perlu scroll) */
    .cust{width:calc(25% - 5px);padding:4px;border-radius:10px;}
    .cust .bubble{font-size:8.5px;min-height:0;padding:2px 4px;margin-bottom:4px;line-height:1.1;}
    .cust .face{font-size:24px;}
    .cust .order{font-size:12px;margin:2px 0;}
    .cust .tags{font-size:8.5px;min-height:0;gap:2px;}
    .tag{padding:1px 3px;}
    .pat{height:5px;margin-top:3px;}

    .thiefLane{height:56px;margin:0 2px;}
    .thief{font-size:32px;}
    .tipjar{font-size:24px;bottom:6px;}
    .tipjar .tjAmt{font-size:10px;}
    .slots{grid-template-columns:repeat(auto-fill,minmax(40px,1fr));gap:5px;}
    .slot .em{font-size:22px;width:22px;height:22px;}
    .panel{padding:6px;gap:5px;}
    button.act{padding:14px 5px;font-size:15px;}
    .rh{font-size:12px;} .rh .big{font-size:16px;}
    .statein{font-size:10px;}
    #jerigen{font-size:22px;padding:2px;}
  }
  /* layar pendek: rapetin, tapi dialog Jermannya tetep ada */
  @media(max-height:720px){
    .customers{min-height:60px;}
    .cust .bubble{font-size:8px;padding:1px 3px;margin-bottom:3px;
      max-height:24px;overflow:hidden;line-height:1.05;}
    .cust .bubble:after{display:none;}
    .cust .face{font-size:20px;max-width:24px;}
    .thiefLane{height:48px;}
    .thief{font-size:28px;}
    .tipjar{font-size:20px;}
  }
</style>
</head>

<script>
(function(){
"use strict";
const $=id=>document.getElementById(id);
// Euro, format Jerman: 5,80 €
const rupiah=n=>Number(n).toLocaleString("de-DE",{minimumFractionDigits:2,maximumFractionDigits:2})+" €";
const cents=n=>Math.round(n*100)/100;

/* ---------- state ---------- */
const G={
  day:0, money:0, hearts:3, running:false,
  timeLeft:0, dayLen:60, served:0, target:0,
  slots:[], warm:0, adonan:0, saus:0,
  reheating:false, reheatT:0,

         tipTotal:0, earned:0},   // earned = total masuk (bukan sisa kas) -> beli upgrade gak ngurangin skor
  customers:[], spawnTimer:0, spawnEvery:4, custId:0,
  batterOpen:false, combo:0, endless:false,
  fever:false, feverT:0,
  rushOn:false, rushStart:0, rushEnd:0,
  blackoutRate:0, blackoutN:0, powerOut:false,
  borongan:false, festival:false, kapalCount:0, kapalNextDay:3, kapalDay:3,
  up:{wajan:1,kompor:0,minyak:0,tangki:0,panci:0,baskom:0,etalase:0,pegawai:0,spanduk:0,speaker:0,genset:0},
};
const PRICE=1.50;  // € per porsi bala2
const ENDLESS_START=250;  // modal mentah pas mulai Endless (Hari 11)
const OILUSE=4.5, OILMIN=12;         // minyak: kepake per goreng; di bawah OILMIN gak bisa goreng
const OILMAX=()=>100+G.up.tangki*70; // tangki lebih gede = jarang ngisi
const POURTIME=1.0;                  // durasi animasi nuang minyak
const SLOTCOUNT=()=>G.up.wajan+2;     // mulai 3 wajan
const MAXVISIBLE=()=>4+G.up.etalase;
const COOKTIME=()=>3.0-G.up.kompor*0.3;
const BURNWINDOW=()=>2.8+G.up.minyak*0.7;
const SAUCECAP=()=>10+G.up.panci*3;
const REHEATTIME=()=>3-G.up.panci*0.5;
const BATCH=()=>14+G.up.baskom*4;
const MIXTARGET=()=>Math.max(5,10-G.up.baskom*2);
const PATIENCE=()=>1+G.up.speaker*0.22;
const TIPMULT=()=>1+G.up.spanduk*0.18+metaTip();   // +perk permanen Langganan Setia
const COMBOMULT=()=>1+Math.min(G.combo*0.05,0.5);
const HELPERDELAY=()=>1.6;           // pegawai gak instan
/* FEVER: combo tinggi -> mode frenzy. Poin dobel + layar makin panas.
   Timer di-refresh tiap kali layani; kalau berhenti melayani, fever padam. */
const FEVERCOMBO=12;                  // masuk fever pas combo capai segini
const FEVERTIME=5.0;                  // detik; tiap serve pas fever nge-reset ke sini
const FEVERMULT=2;                    // penghasilan dikali segini selama fever

/* ===== META-PROGRESSION: tingkat kesulitan + perk permanen =====
   G.tier 0/1/2 = Normal/Sulit/Ekstrem. Makin tinggi makin berat TAPI ⭐ lebih banyak.
   Perk permanen kecil-kecil (kesimpen di HP), diimbangi kesulitan yg naik biar gak
   kegampangan buat pemain lama. */
const OILDAY0=3, THIEFDAY0=5;        // hari mekanik mulai (sama utk kedua mode)
// Endless: kedalaman = berapa hari lewat Hari 10. Kampanye = selalu 0.
const ED=()=>G.endless?Math.max(0,G.day-10):0;
const EDx=()=>G.endless?Math.max(0,G.day-10)+2:0;   // intensitas escalation: hari 11 udah kerasa
// Napas tiap 6 hari endless (Prinsip 3: squeeze & release) -> spawn agak longgar.
const EBREATH=()=>1;   // hari santai di tengah dimatiin
// Pengali kesulitan endless (naik pelan, ada cap biar tetap adil - Prinsip 8).
const difRush  =()=>Math.max(0.28, 1 - EDx()*0.060) * EBREATH();   // rush makin rapet
const difCalm  =()=>Math.max(0.70, 1 - ED()*0.012);               // luar rush lebih santai
const difPat   =()=>Math.max(0.42, 1 - EDx()*0.045);               // kesabaran turun
const difTarget=()=>1 + EDx()*0.155;
const difOil   =()=>Math.min(2.3, 1 + EDx()*0.08);
const difThief =()=>Math.min(3.0, 1 + EDx()*0.095);
/* perk permanen -> efek */
const metaModal =()=>getPerk("modal")*5;      // +€ modal awal per level
const metaPrepA =()=>getPerk("prep")*6;       // +adonan tiap buka
const metaPrepW =()=>getPerk("prep")*3;       // +bala2 siap saji (udah digoreng subuh)
const metaTip   =()=>getPerk("tip")*0.08;     // + ke pengali Trinkgeld
const metaEagle =()=>getPerk("eagle")*0.30;   // maling lebih lama nyampe (25-30%)
const metaThrift=()=>getPerk("thrift")*0.08;  // diskon upgrade toko
const MAXHEARTS =()=>3+getPerk("life");        // perk Nyawa Ekstra: nambah nyawa maks (& awal)

const UPGRADES=[
  {k:"wajan", ic:"🍳", name:"Penggorengan Lebih Besar", desc:"+1 slot penggorengan", max:5, cost:l=>31+l*27},
  {k:"kompor",ic:"⚡", name:"Fritteuse Turbo",     desc:"Menggoreng lebih cepat", max:4, cost:l=>36+l*31},
  {k:"minyak",ic:"✨", name:"Minyak Berkualitas",desc:"Lebih lama sebelum gosong", max:4, cost:l=>26+l*24},
  {k:"tangki",ic:"🛢️", name:"Tangki Minyak Besar",desc:"Kapasitas minyak lebih gede — gak sering-sering ngisi", max:3, cost:l=>29+l*24},
  {k:"panci", ic:"🥜", name:"Panci Saus Besar",  desc:"Saus lebih banyak & cepat panas", max:4, cost:l=>26+l*21},
  {k:"baskom",ic:"🥣", name:"Baskom & Mixer",    desc:"Sekali buat = adonan lebih banyak", max:4, cost:l=>31+l*27},
  {k:"etalase",ic:"🪟",name:"Etalase Lega",      desc:"+1 antrean pembeli", max:4, cost:l=>31+l*27},
  {k:"pegawai",ic:"🧑‍🍳",name:"Rekrut Pegawai",  desc:"Bantu pindahin bala2 matang ke penghangat (agak telat, gak instan). Investasi gede!", max:1, cost:l=>235},
  {k:"spanduk",ic:"🚩", name:"Spanduk Promosi",  desc:"Trinkgeld pembeli lebih besar", max:3, cost:l=>26+l*24},
  {k:"speaker",ic:"🔊", name:"Speaker Dangdut",  desc:"Pembeli lebih sabar", max:3, cost:l=>26+l*21},
  {k:"genset",ic:"🔌", name:"Genset Cadangan",   desc:"1 wajan kebal mati lampu — gak bisa semua kebal", max:4, cost:l=>170+l*140},
];
/* Endless money-sink: upgrade KAPASITAS boleh dibeli lebih jauh. Kompor/wajan/etalase tetap di-cap biar gak trivial. */
const UPX={tangki:6, baskom:6, spanduk:6, speaker:6};
const upMax=(u)=>u.max + (G.endless?(UPX[u.k]||0):0);

/* ================= MESIN AUDIO =================
   - 1 buffer noise dipakai ulang (dulu bikin buffer baru tiap suara -> berat di HP)
   - bus terpisah: musik & sfx, lewat limiter -> gak pernah pecah walau banyak suara barengan
   - semua suara dijadwal pakai jam Web Audio (bukan setTimeout) -> presisi
================================================= */
let actx=null, busSfx=null, busMusic=null, noiseBuf=null;
function audio(){
  if(typeof window==="undefined")return null;
  if(!actx){
    const AC=window.AudioContext||window.webkitAudioContext;
    if(!AC) return null;
    actx=new AC();
    // limiter: nahan puncak biar gak clipping pas jam rame (banyak suara nubruk)
    const lim=actx.createDynamicsCompressor();
    lim.threshold.value=-6; lim.knee.value=8; lim.ratio.value=14;
    lim.attack.value=0.003; lim.release.value=0.18;
    const master=actx.createGain(); master.gain.value=0.85;
    busSfx=actx.createGain();   busSfx.gain.value=G.sfxVol;
    busMusic=actx.createGain(); busMusic.gain.value=0.7*G.musicVol;   // musik: cukup kedengeran di belakang
    busSfx.connect(master); busMusic.connect(master);
    master.connect(lim); lim.connect(actx.destination);
    // noise 1 detik, dibikin SEKALI, dipakai ulang selamanya
    const len=Math.floor(actx.sampleRate);
    noiseBuf=actx.createBuffer(1,len,actx.sampleRate);
    const d=noiseBuf.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
  }
  if(actx.state==="suspended") actx.resume();
  return actx;
}
function noise(dur,freq,q,vol,sweepTo,bus,when){
  const a=audio(); if(!a||!noiseBuf) return;
  const t=when||a.currentTime;
  const src=a.createBufferSource(); src.buffer=noiseBuf; src.loop=true;
  src.playbackRate.value=0.85+Math.random()*0.3;      // variasi kecil, gak monoton
  const bp=a.createBiquadFilter(); bp.type="bandpass";
  bp.frequency.setValueAtTime(freq,t);
  if(sweepTo) bp.frequency.linearRampToValueAtTime(sweepTo,t+dur);
  bp.Q.value=q;
  const g=a.createGain();
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(vol,t+0.006);   // attack halus
  g.gain.exponentialRampToValueAtTime(0.0008,t+dur);  // decay
  src.connect(bp);bp.connect(g);g.connect(bus||busSfx);
  src.start(t); src.stop(t+dur+0.03);
}
function tone(f,dur,vol,wave,rampTo,bus,when){
  const a=audio(); if(!a) return;
  const t=when||a.currentTime;
  const o=a.createOscillator(), g=a.createGain();
  o.type=wave||"triangle";
  o.frequency.setValueAtTime(f,t);
  if(rampTo) o.frequency.exponentialRampToValueAtTime(Math.max(20,rampTo),t+dur);
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(vol,t+0.008);   // attack -> hilangin bunyi "klik"
  g.gain.exponentialRampToValueAtTime(0.0008,t+dur);
  o.connect(g); g.connect(bus||busSfx);
  o.start(t); o.stop(t+dur+0.03);
}
/* ---------- setelan (kesimpen di HP) ---------- */
function loadSettings(){
  try{
    const s=JSON.parse(localStorage.getItem("bala2_set"));
    if(s){ G.sfxOn=s.sfxOn!==false; G.musicOn=s.musicOn!==false;
           if(s.perkOff && typeof s.perkOff==="object") G.perkOff=s.perkOff;
           if(typeof s.sfxVol==="number") G.sfxVol=Math.max(0,Math.min(1,s.sfxVol));

/* ---------- musik latar: penjadwal look-ahead (anti-ngedrift) ----------
   setInterval doang bakal geser-geser & tersendat kalau browser sibuk.
   Ini nyicil jadwal not ke depan pakai jam Web Audio -> ketukannya rapi. */
let musicTimer=null, musicStep=0, nextNote=0;
/* Lagu latar ceria bertema pasar/festival. C mayor, progresi I–V–vi–IV.
   8 bar (64 langkah 1/8), ~10 dtk, biar gak cepet bosen. */
const STEP=0.16, AHEAD=0.22;
const CHORDS=[                                   // bass + nada akor per bar
  {bass:130.81, tri:[261.63,329.63,392.00]},     // C  (C E G)
  {bass:196.00, tri:[246.94,293.66,392.00]},     // G  (B D G)
  {bass:220.00, tri:[261.63,329.63,440.00]},     // Am (C E A)
  {bass:174.61, tri:[261.63,349.23,440.00]},     // F  (C F A)
];
const MEL=[                                      // melodi (0 = diam)
  523.25,0,659.25,0, 587.33,0,523.25,0,          // bar 1  C
  493.88,0,587.33,0, 392.00,0,493.88,0,          // bar 2  G
  523.25,0,440.00,0, 523.25,0,659.25,0,          // bar 3  Am
  440.00,0,349.23,0, 392.00,0,440.00,0,          // bar 4  F
  659.25,0,587.33,0, 523.25,0,659.25,0,          // bar 5  C (variasi naik)
  587.33,0,493.88,0, 392.00,0,587.33,0,          // bar 6  G
  659.25,0,523.25,0, 440.00,0,523.25,0,          // bar 7  Am
  392.00,0,349.23,0, 261.63,0,392.00,0,          // bar 8  F
];
function scheduleMusic(){
  const a=audio(); if(!a) return;
  if(!G.musicOn){ stopMusic(); return; }
  while(nextNote < a.currentTime + AHEAD){
    const step=musicStep%64, ch=CHORDS[Math.floor(step/8)%4];
    const m=MEL[step];
    if(m) tone(m,.16,.06,"triangle",null,busMusic,nextNote);                  // melodi
    if(step%2===0) tone(ch.bass,.17,.075,"sine",null,busMusic,nextNote);      // bass mantul
    if(step%8===0||step%8===4) ch.tri.forEach(f=>tone(f,.20,.018,"sawtooth",null,busMusic,nextNote)); // chord stab
    if(step%4===0) tone(72,.10,.09,"sine",40,busMusic,nextNote);              // kick
    if(step%2===1) noise(.02,6500,1.2,.018,null,busMusic,nextNote);           // hi-hat
    musicStep++;
    nextNote+=STEP;
  }
}
function startMusic(){
  if(musicTimer || !G.musicOn) return;
  const a=audio(); if(!a) return;
  musicStep=0; nextNote=a.currentTime+0.06;
  scheduleMusic();
  musicTimer=setInterval(scheduleMusic,40);
}
function stopMusic(){ if(musicTimer){ clearInterval(musicTimer); musicTimer=null; } }

/* ---------- gitar listrik: buat jingle kemenangan ----------
   3 saw didetune + sedikit distorsi (waveshaper) + lowpass -> bunyi kayak petikan gitar listrik. */
let distCurve=null;
function guitar(f,dur,vol,when){
  const a=audio(); if(!a) return;
  const t=when||a.currentTime;
  if(!distCurve){ distCurve=new Float32Array(256);
    for(let i=0;i<256;i++){ const x=i/128-1; distCurve[i]=Math.tanh(x*3.2); } }
  const pre=a.createGain(); pre.gain.value=1;
  const ws=a.createWaveShaper(); ws.curve=distCurve; ws.oversample="2x";
  const lp=a.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=2800; lp.Q.value=1.6;
  const g=a.createGain();
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(vol,t+0.008);          // petik
  g.gain.exponentialRampToValueAtTime(vol*0.55,t+dur*0.45);  // sustain
  g.gain.exponentialRampToValueAtTime(0.0008,t+dur);         // luruh
  pre.connect(ws); ws.connect(lp); lp.connect(g); g.connect(busMusic);
  [0,-6,6].forEach(cents=>{
    const o=a.createOscillator(); o.type="sawtooth";
    o.frequency.value=f*Math.pow(2,cents/1200);
    o.connect(pre); o.start(t); o.stop(t+dur+0.04);
  });
}
/* Reff "Sayur Kol" (Punxgoaran) — gitar listrik, sekali jalan pas menang.
   Chord asli C mayor: "sayur kol"(F) "sayur kol"(C), "makan daging anjing dengan sayur kol"(G->C). */
function winJingle(){
  const a=audio(); if(!a || !G.musicOn) return;
  const t0=a.currentTime+0.2;
  const G4=392.00,A4=440.00,B4=493.88,C5=523.25,D5=587.33,E5=659.25,F5=698.46;
  // lead vokal (freq, mulai dtk, panjang dtk) — nada + ritme rekaman Bernard
  const lead=[
    [C5,0.000,0.17],[B4,0.170,0.23],[A4,0.403,0.39],[C5,0.789,0.39],[F5,1.177,0.42],   // sa-yur ko-o-ol
    [C5,1.593,0.20],[A4,1.797,0.26],[G4,2.058,0.31],[C5,2.369,0.36],[E5,2.728,0.33],    // sa-yur ko-o-ol
    [C5,3.055,0.19],[C5,3.243,0.22],[D5,3.465,0.22],[D5,3.682,0.22],                     // ma-kan da-ging
    [D5,3.898,0.22],[D5,4.114,0.25],                                                     // an-jing
    [G4,4.362,0.26],[G4,4.624,0.23],                                                     // de-ngan
    [E5,4.855,0.23],[D5,5.086,0.22],[C5,5.306,1.36]                                      // sa-yur kol
  ];
  lead.forEach(n=>guitar(n[0],n[2],0.16,t0+n[1]));
  // power chord (root + kuint) — "sa-yur" cuma ancang2, chord masuk pas "ko" (downbeat)
  const chord=(root,fifth,at,dur)=>{ guitar(root,dur,0.09,t0+at); guitar(fifth,dur,0.08,t0+at); };
  chord(174.61,261.63,0.403,1.655);   // F  masuk pas "ko" frase 1
  chord(130.81,196.00,2.058,0.997);   // C  masuk pas "ko" frase 2
  chord(196.00,293.66,3.055,2.251);   // G  makan daging anjing dengan
  chord(130.81,196.00,5.306,1.36);    // C  resolusi di "kol"
}

/* rem suara: satu jenis bunyi gak boleh nubruk dirinya sendiri terlalu rapat.
   Pas jam rame, dulu 5 pembeli dateng bareng = 5 bunyi numpuk jadi "brak". */
const SFXGAP={arrive:.09,ding:.06,tick:.05,tickHi:.05,coin:.05,serve:.05,fry:.07,plink:.05,chop:.03};
const lastAt={};
function sfx(type){
  try{
    if(typeof window==="undefined" || !G.sfxOn) return;
    const a=audio(); if(!a) return;
    const t=a.currentTime;
    const gap=SFXGAP[type];
    if(gap && lastAt[type] && t-lastAt[type] < gap) return;   // ditahan, biar gak numpuk
    lastAt[type]=t;

    switch(type){
      case "fry":   noise(.45,2800,.7,.10,1600); break;              // ceees~ masuk minyak
      case "pour":  noise(POURTIME,700,.5,.10,300); tone(180,.5,.05,"sine",120); break; // glug glug
      case "ding":  tone(880,.13,.13,"sine",1180); break;
      // nada naik 1 semitone tiap combo
      case "serve": {const st=Math.pow(1.0595,Math.min(G.combo,14));
        tone(620*st,.11,.16,"triangle",1050*st);} break;
      case "coin":  tone(1046,.08,.11,"square");
                    tone(1568,.09,.09,"square",null,null,t+.07); break;
      case "burnt": noise(.35,500,.4,.12,120); tone(85,.28,.12,"sawtooth"); break;
      case "leave": tone(240,.3,.14,"sine",120); break;
      case "combo": tone(784,.1,.13,"square",1046); break;
      case "arrive":tone(1320,.07,.07,"sine");
                    tone(990,.09,.06,"sine",null,null,t+.08); break;
      case "click": tone(1500,.04,.12,"square");
                    tone(500,.06,.10,"square",null,null,t+.04); break;   // sekring nyeklek
      case "chop":  noise(.09,1500,1.2,.09); break;
      case "plak":  noise(.05,2400,.6,.28,600); tone(240,.07,.16,"square",90); break;
      case "sneak": tone(180,.16,.06,"sine",120);
                    tone(150,.16,.05,"sine",100,null,t+.16); break;
      // sirene maling dateng
      case "alert": tone(440,.16,.17,"square",330);
                    tone(330,.22,.17,"square",247,null,t+.17);
                    tone(440,.16,.14,"square",330,null,t+.40); break;
      case "tick":  tone(760,.045,.09,"square"); break;               // langkah maling
      case "tickHi":tone(1180,.05,.15,"square",900); break;           // udah deket kaleng!
      case "plink": tone(1760,.09,.07,"sine",2200); break;            // koin perak masuk kaleng
    }
  }catch(e){}
}

function fritteuseSVG(t){

  var s='<svg class="fry" viewBox="0 0 100 100" preserveAspectRatio="none">';
  s+='<rect x="3" y="3" width="94" height="94" rx="13" fill="'+body+'" stroke="#2b2622" stroke-width="4"/>';
  s+='<rect x="17" y="12" width="66" height="60" rx="10" fill="#4a3418" stroke="#2b2622" stroke-width="3.5"/>';
  if(t>=3){ s+='<rect x="8" y="76" width="84" height="6" rx="3" fill="#5b9dff"/><circle cx="24" cy="88" r="4" fill="#3fae5a"/><circle cx="76" cy="88" r="4" fill="#e23c3c"/><rect x="38" y="84" width="24" height="9" rx="2" fill="#12301e"/><rect x="42" y="86" width="3" height="5" fill="#4dff9b"/><rect x="48" y="86" width="3" height="5" fill="#4dff9b"/><rect x="54" y="86" width="3" height="5" fill="#4dff9b"/>'; }
  else if(t>=2){ s+='<rect x="8" y="78" width="84" height="5" rx="2" fill="#ffb100"/><circle cx="30" cy="89" r="4.5" fill="#e23c3c"/><rect x="56" y="84" width="16" height="10" rx="2" fill="#cfd4d9" stroke="#2b2622" stroke-width="2"/>'; }
  else { s+='<circle cx="50" cy="87" r="4.5" fill="#3a352f" stroke="#2b2622" stroke-width="2"/>'; }

function renderSlots(){
  const el=$("slots");if(!el)return;

    d.className="slot "+s.state+(s.off?" off":"")+(i>=G.slots.length-im?" immune":"");

  const avail=[];G.slots.forEach((s,i)=>{if(!s.off && i < G.slots.length-im)avail.push(i);});

function makeCustomer(){
  const d=G.day;
  // Ini di Jerman: mayoritas pembeli orang Jerman.
  const r=Math.random();
  // Anak kapal pesiar = kejadian LANGKA. Boleh lebih dari sekali, tapi jangan sering.
  // Dulu 5% per pembeli tanpa batas -> rata-rata 15x per run. Gak spesial lagi.
  // Sekarang: maks 3x per run, jeda min 2 hari antar kemunculan.
  // Yang PERTAMA dijamin ada: harinya diundi (3-6), dan kalau hari itu lewat
  // tanpa muncul, peluangnya dinaikin (pity) sampai kejadian. Jadi 0x mustahil.
  // Yang ke-2 & ke-3 baru diserahin ke peluang kecil (1,2%).
  const belum  = G.kapalCount===0;
  const pity   = belum && G.day>=G.kapalDay;
  const boleh  = G.day>=3 && G.kapalCount<3 && G.day>=G.kapalNextDay;
  const paksa  = belum && G.day>G.kapalDay;         // telat? gas, jangan sampe 0x
  const kapal  = boleh && (paksa || r < (pity ? 0.12 : 0.012));
  if(kapal){ G.kapalCount++; G.kapalNextDay=G.day+2; }
  const indo  = !kapal && r<0.22;       // orang Indo yg tinggal di Jerman
  const lang  = kapal||indo ? "id" : "de";
  const borongan=(G.borongan&&Math.random()<0.15)||kapal;
  let qty;
  if(kapal) qty=5+Math.floor(Math.random()*4);              // 5–8, rombongan kapal
  else if(borongan) qty=4+Math.floor(Math.random()*3);      // 4–6
  else qty=1+Math.floor(Math.random()*Math.min(3+Math.floor(d*0.15),4));  // hari awal gak lagi cuma 1-2 porsi
  const kacang=Math.random()<Math.min(.55+d*0.03,.9);
  const bungkus=d>=3&&Math.random()<Math.min(.14+d*0.03,.5);
  const buru=d>=2&&!borongan&&Math.random()<Math.min(.05+d*0.02,.22);
  // hari WM (festival): banyak supporter timnas Jerman — jersey putih + bendera di pipi
  const supporter=G.festival&&!kapal&&Math.random()<0.5;
  let pat=(12+qty*1.9)*PATIENCE()*difPat();   // endless makin dalam: pembeli lebih gak sabar
  if(buru)pat*=0.75; if(bungkus)pat*=1.2; if(borongan)pat*=1.5; if(kapal)pat*=1.4;
  pat/=(1+d*0.02);
  const c={id:++G.custId,
    face:avatarSVG(lang,kapal,buru,supporter),
    qty,kacang,bungkus,buru,borongan,kapal,supporter,lang,pat,patMax:pat};
  c.say=custSay(c);
  G.customers.push(c);
  sfx("arrive");
  renderCustomers();
}
function custSay(c){
  if(c.kapal){
    const g=["Bang","Mas","Bang"][Math.floor(Math.random()*3)];
    let s=`${g}! Kita anak kapal pesiar, kangen bala2 — borong ${c.qty}`;
    if(c.kacang)s+=" pake bumbu kacang";
    if(c.bungkus)s+=", dibungkus";
    return s+" ya!";
  }
  if(c.lang==="id"){
    const g=["Bang","Mas","Kak","Bu","Pak"][Math.floor(Math.random()*5)];
    let s=c.borongan?`${g}, borong ${c.qty}`:`${g}, bala2 ${c.qty}`;
    const ex=[];
    if(c.kacang)ex.push("pake bumbu kacang");
    if(c.bungkus)ex.push("dibungkus ya");
    if(c.borongan)ex.push("buat acara");
    if(ex.length)s+=" "+ex.join(", ");
    s+=c.buru?" — buruan ya!":"!";
    return s;
  }
  // Deutsch
  const g=["Moin","Moin moin","Hallo","Guten Tag","Entschuldigung"][Math.floor(Math.random()*5)];
  let s=`${g}, ${c.qty}x Bala2`;
  const ex=[];
  if(c.kacang)ex.push("mit Erdnusssoße");
  if(c.bungkus)ex.push("zum Mitnehmen");
  if(c.borongan)ex.push("für eine Feier");
  if(ex.length)s+=" "+ex.join(", ");
  s+=c.buru?" — schnell, bitte!":", bitte!";
  return s;
}
function sauceNeed(c){ return c.kacang ? Math.ceil(c.qty/2) : 0; }   // 1 centong per 2 porsi
function canServe(c){ return G.warm>=c.qty && G.saus>=sauceNeed(c); }
function renderCustomers(){
  const el=$("customers");if(!el)return;
  el.innerHTML="";

function serveCustomer(id){
  const idx=G.customers.findIndex(c=>c.id===id);if(idx<0)return;
  const c=G.customers[idx];
  const el=document.querySelector('.cust[data-id="'+id+'"]');
  if(!canServe(c)){ if(el){el.classList.remove("shake");void el.offsetWidth;el.classList.add("shake");} return; }
  G.warm-=c.qty; G.saus-=sauceNeed(c);
  G.combo++;
  // duit penjualan (emas) dipisah dari Trinkgeld (perak)
  let base=c.qty*PRICE;
  if(c.bungkus)base+=0.50;              // Verpackung
  if(c.kacang)base+=0.40;               // Erdnusssoße
  if(c.borongan)base+=c.qty*0.20;
  const speed=c.pat/c.patMax;
  let tip=base*0.26*speed*TIPMULT()*COMBOMULT();   // Trinkgeld gede -> kaleng jadi taruhan nyata
  if(c.buru)tip*=1.5;
  if(c.kapal)tip*=6;                    // anak kapal pesiar: Trinkgeld-nya gede banget
  // FEVER: combo nyampe ambang -> nyalain/perpanjang. Serve yg memicu ikut dapet bonus.
  if(G.combo>=FEVERCOMBO){ const wasOff=!G.fever; startFever(); if(wasOff) sfx("combo"); }
  if(G.fever){ base*=FEVERMULT; tip*=FEVERMULT; }
  base=cents(base); tip=cents(tip);
  const earn=cents(base+tip);
  G.money=cents(G.money+earn); G.tipToday=cents(G.tipToday+tip); G.served++;
  G.stats.porsi+=c.qty; G.stats.served++; G.stats.tipTotal+=tip;
  G.stats.earned=cents(G.stats.earned+earn);          // buat skor
  if(G.combo>G.stats.bestCombo) G.stats.bestCombo=G.combo;
  // achievements
  unlock("first");
  if(c.kapal && bumpLife("kapal")>=6) unlock("kapal");
  if(G.combo>=25) unlock("combo10");
  // tips & rich sekarang KUMULATIF -> dihitung di akhir main (checkRunAch)
  showFloat(el,"+"+rupiah(earn),G.fever?"#ffcf33":"var(--good)");
  if(G.fever){showFloat(el,"🔥 FEVER x"+FEVERMULT,"#ff7a1a");}
  else if(G.combo>=2){showFloat(el,"🔥 x"+G.combo,"#c0392b");sfx("combo");}
  sfx("serve");sfx("coin");
  flyCoins(el, Math.min(2+Math.floor(c.qty/2), 6), "gold");           // ke kas
  if(tip>0){
    flyCoins(el, Math.max(1,Math.min(5,Math.round(tip/0.5))), "silver"); // ke kaleng Trinkgeld
    setTimeout(()=>sfx("plink"),430);
  }
  G.customers.splice(idx,1);
  updateHUD();updateRes();renderCustomers();
}
function loseCustomer(c){

  endFever();                           // streak putus -> fever padam

}

  moveGhost(e);
  window.addEventListener("pointermove",onMove);
  window.addEventListener("pointerup",onUp);
  // Android: kalau jari ditarik keluar layar, ada telpon masuk, atau sistem
  // ngambil alih sentuhan -> pointerup GAK PERNAH kepanggil dan ghost nyangkut.
  window.addEventListener("pointercancel",onUp);
  window.addEventListener("blur",onUp);
}
function moveGhost(e){ if(ghost){ghost.style.left=e.clientX+"px";ghost.style.top=e.clientY+"px";} }
function onMove(e){
  moveGhost(e);
  const el=document.elementFromPoint(e.clientX,e.clientY);
  const sl=$("slots");
  sl.classList.toggle("dropok", drag&&drag.type==="oil"&&!!(el&&el.closest("#slots")));
}
function onUp(e){
  // e bisa dari pointercancel/blur -> gak ada koordinat. Jangan sampai crash;
  // yang penting ghost-nya tetep dibersihin.
  const hasPos = e && typeof e.clientX==="number" && typeof e.clientY==="number";
  if(hasPos && e.type==="pointerup"){
    const el=document.elementFromPoint(e.clientX,e.clientY);
    if(drag && drag.type==="oil" && el && el.closest("#slots")) refillOil();
  }
  if(ghost){ghost.remove();ghost=null;}
  const sl=$("slots"); if(sl) sl.classList.remove("dropok");
  drag=null;
  window.removeEventListener("pointermove",onMove);
  window.removeEventListener("pointerup",onUp);
  window.removeEventListener("pointercancel",onUp);
  window.removeEventListener("blur",onUp);
}

/* ---------- loop ---------- */
let last=0;
function loop(ts){
  if(!G.running)return;
  const dt=Math.min(.05,(ts-last)/1000||0);last=ts;
  const cook=COOKTIME(),burn=BURNWINDOW();
  let dirty=false;
  G.slots.forEach((s,i)=>{
    if(s.off) return;                       // mati: beku sampai sekring dinyalain
    if(s.state==="cooking"){
      s.t+=dt;
      if(s.t>=cook){s.state="ready";s.t=0;s.helper=0;dirty=true;sfx("ding");}
    } else if(s.state==="ready"){
      s.t+=dt;
      if(G.up.pegawai){ s.helper+=dt; if(s.helper>=HELPERDELAY()){ toWarmer(i); pegawaiPress(); dirty=true; return; } }
      if(s.t>=burn){s.state="burnt";dirty=true;sfx("burnt");G.stats.burnt++;
        if(bumpLife("burn")>=30) unlock("burn");}
    }
  });
  tickFever(dt);
  if(G.powerOut) G.stats.fuseDown+=dt;                       // wajan nganggur gara2 sekring
  if(G.oilOn && G.oil<OILMIN) G.stats.oilDown+=dt;           // gak bisa goreng gara2 minyak
  if(G.blackoutRate>0 && !G.powerOut && Math.random()<G.blackoutRate*dt*(G.customers.length>4?0.35:1)) tripPower();
  // pencuri Trinkgeld
  if(G.thiefOn){
    if(!G.thief){ if(Math.random()<G.thiefRate*dt) spawnThief(); }
    else {
      const th=G.thief;
      th.t-=dt;
      if(th.t<=0) stealTip();
      else {
        // langkah maling: makin deket kaleng, makin cepet & makin panik bunyinya
        const p=1-th.t/th.tMax;
        th.tickT+=dt;
        const iv=0.80-0.55*p;                 // 0,80 dtk -> 0,25 dtk
        if(th.tickT>=iv){ th.tickT=0; sfx(p>0.65?"tickHi":"tick"); }
        updateThief();
      }
    }
  }
  if(dirty) renderSlots();
  else document.querySelectorAll(".slot.cooking").forEach(d=>{
    const i=+d.dataset.i,s=G.slots[i];if(!s||s.state!=="cooking")return;
    const p=Math.min(1,s.t/cook),deg=p*360,c=p<.6?"#e8a11c":"#6fbf3f";
    const r=d.querySelector(".ring");if(r)r.style.background=`conic-gradient(${c} ${deg}deg,#0000 ${deg}deg)`;
  });
  if(G.pouring){
    G.pourT+=dt;
    const p=Math.min(1,G.pourT/POURTIME);
    G.oil=G.pourFrom+(OILMAX()-G.pourFrom)*p;
    if(p>=1) finishPour(); else updateRes();
  }
  if(G.reheating){G.reheatT+=dt;if(G.reheatT>=REHEATTIME()){G.reheating=false;G.saus=SAUCECAP();}updateRes();}
  if(G.batterOpen&&batterStage==="mix"){mixVal=Math.max(0,mixVal-dt*7);updateMixBar();}
  for(let i=G.customers.length-1;i>=0;i--){
    const c=G.customers[i];c.pat-=dt;
    const pb=$("pat"+c.id);
    if(pb){const r=Math.max(0,c.pat/c.patMax);pb.style.width=(r*100)+"%";
      pb.style.background=r>.5?"var(--good)":r>.25?"var(--accent2)":"var(--bad)";}
    if(c.pat<=0){G.customers.splice(i,1);loseCustomer(c);renderCustomers();}
  }
  const elapsed=G.dayLen-G.timeLeft,was=G.rushOn;
  G.rushOn=elapsed>=G.rushStart&&elapsed<G.rushEnd;
  if(G.rushOn!==was){
    $("rushBanner").style.display=G.rushOn?"flex":"none";
    if(G.rushOn){ sfx("combo"); showChar("🤩","Jam rame! Pembeli pada dateng nih!",2600); }
    else showChar("😌","Jam rame udah lewat. Santai dikit.",2000);
  }
  G.spawnTimer-=dt;
  if(G.spawnTimer<=0&&G.customers.length<MAXVISIBLE()){
    makeCustomer();
    let base=G.rushOn ? G.spawnEvery*0.65*difRush() : G.spawnEvery*difCalm();  // ritme: rush ganas, luar rush ada napas
    if(G.festival)base*=0.85;
    G.spawnTimer=base*(0.8+Math.random()*0.5);
  }
  G.timeLeft-=dt;
  if(G.timeLeft<=0){endDay();return;}
  updateClock();
  requestAnimationFrame(loop);
}

/* ---------- day flow (tantangan gak dibocorin di awal) ---------- */
function setupEvents(day){
  G.blackoutRate=0;G.blackoutN=0;G.borongan=false;G.festival=false;
  G.oilOn=day>=OILDAY0;
  G.thiefOn=day>=THIEFDAY0; G.thiefRate=(day>=THIEFDAY0?(0.016+(day-THIEFDAY0)*0.004):0)*difThief();  // endless: maling makin sering
  let news=null;
  if(day===3) news={who:"#ch-supp",title:"Minyak",demo:"oil",
    msg:"\"Kalau minyak mau habis, ditambahin ya. Kalau habis, gak bisa goreng.\""};
  else if(day===4){ G.blackoutRate=0.05;G.blackoutN=1;
    news={who:"#ch-elek",title:"Tukang Listrik",demo:"fuse",
      msg:"\"Listrik di sini labil, sekringnya suka jeglek. Kalau mati, wajan gak nyala sendiri — kamu harus nyalain sekringnya sendiri ya.\""}; }
  else if(day===5){ G.blackoutRate=0.065;G.blackoutN=2;
    news={who:"#ch-pol",title:"Hati-hati Copet",demo:"thief",
      msg:"\"Akhir-akhir ini ada yang suka ngincer tip jar di stand-stand. Kalau ada yang mencurigakan, langsung tegur ya — jangan sampai keburu kebawa!\""}; }
  else if(day===6){ G.borongan=true;G.blackoutRate=0.055;G.blackoutN=2;
    news={who:"#ch-neigh",title:"Pesanan Borongan",msg:"\"Stand sebelah tutup! Banyak yang mau borong sekaligus. Siapin stok di penghangat ya.\""}; }
  else if(day===7){ G.borongan=true;G.festival=true;G.blackoutRate=0.055;G.blackoutN=2;
    news={who:"#ch-fan",title:"Pertandingan WM!",msg:"\"Malam ini ada pertandingan Piala Dunia — orang-orang nonton bareng terus pada laper. Bakal rame banget!\""}; }
  else if(day===8){ G.borongan=true;G.festival=true;G.blackoutRate=0.065;G.blackoutN=3; }
  else if(day===9){ G.borongan=true;G.festival=true;G.blackoutRate=0.075;G.blackoutN=3;
    news={who:"#ch-fire",title:"Menuju Puncak",msg:"\"Dua hari lagi. Semua tantangan aktif sekaligus. Gaskeun!\""}; }
  else if(day===10){ G.borongan=true;G.festival=true;G.blackoutRate=0.08;G.blackoutN=3;
    news={who:"#ch-flag",title:G.endless?"Puncak — Lanjut!":"Hari Terakhir!",msg:G.endless?"\"Lewat sini stand buka terus, tiap hari makin gila. Sampai mana kamu bertahan?\"":"\"Hari terakhir jualan. Habis-habisan ya!\""}; }
  else if(day>10){ const ez=day-10; G.borongan=true;G.festival=true; G.blackoutN=Math.min(5,3+Math.floor(ez/9)); G.blackoutRate=Math.min(0.12,0.06+ez*0.009);   // mati lampu 3 wajan, naik ke 5 makin dalam
    news=((day-10)%6===0)?{who:"#ch-supp",title:"Agak Lengang",msg:"\"Hari ini rada sepi — pas buat napas & upgrade.\""}:null; }
  return news;
}
function startDay(){
  G.day++;
  G.dayLen=Math.round((55+G.day*3)*0.81);   // hari dipendekin 10% lagi (total ~19%)
  G.timeLeft=G.dayLen;
  G.served=0;G.target=Math.round((4+G.day*1.2)*0.81*difTarget());   // endless: target naik tiap hari
  G.spawnEvery=Math.max(2.6,5.0-G.day*0.18);   // awal udah lumayan padat, akhir tetep sama
  G.customers=[];G.spawnTimer=1.5;
  G.warm=metaPrepW();G.adonan=18+metaPrepA();G.saus=SAUCECAP();   // perk Prep Subuh
  G.reheating=false;G.reheatT=0;
  G.oil=OILMAX();G.combo=0;
  G.pouring=false;G.pourT=0;
  G.thief=null;G.thiefHit=false;
  G.tipToday=0;                          // kaleng Trinkgeld dikosongin tiap pagi
  $("pourFx").style.display="none";
  $("thiefEl").style.display="none";
  $("thiefEl").classList.remove("hit");
  $("tipjar").classList.remove("grab");
  G.rushStart=G.dayLen*(6/12);G.rushEnd=G.dayLen*(10/12);
  G.rushOn=false;

  $("fuseBanner").style.display="none";
  $("charLayer").innerHTML="";
  const news=setupEvents(G.day);
  if(G.batterOpen)closeBatter();
  buildSlots();updateHUD();renderCustomers();
  if(news) showNews(news); else beginDay();
}

  c.querySelectorAll(".shop button[data-k]").forEach(b=>b.onclick=()=>{
    const u=UPGRADES.find(x=>x.k===b.dataset.k),lvl=G.up[u.k];
    if(lvl>=upMax(u))return;
    const cost=UPCOST(u,lvl);
    if(G.money<cost)return;
    G.money=cents(G.money-cost);G.up[u.k]++;
    if(G.up[u.k]>=upMax(u)) unlock("maxup");
    showShop(0);
  });
  $("next").onclick=startDay;
}
function resetGame(){
  // G.tier udah diset dari layar pilih kesulitan sebelum ini dipanggil.
  G.day=0;G.money=metaModal();G.hearts=MAXHEARTS();G.warm=0;G.adonan=0;G.saus=0;   // perk Modal Awal & Nyawa Ekstra

           tipTotal:0, earned:0};

/* ================= SKOR =================
   Skor = PEMASUKAN-BERSIH × TUMPUKAN PENGGANDA.
   Pengganda di-earn lewat cara main: kesulitan, combo, nyawa sisa, tamat.
   Bikin skor punya banyak sumbu (gak flat) & leaderboard jadi soal skill,
   bukan sekadar jualan lama-lama.                                   */
const FINISHBONUS=0.15;               // bonus € kalau tamat Kampanye 10 hari
const COMBOCAP=0.6;                   // batas sumbangan combo
/* rincian bonus (% pemasukan) -> ditampilin di layar akhir jadi € */
function scoreParts(win){
  const parts=[];
  const cb=Math.min(G.stats.bestCombo*0.015, COMBOCAP);
  if(cb>0) parts.push({label:"Combo x"+G.stats.bestCombo, v:cb});
  const hp=Math.max(0,G.hearts)*0.08;
  if(hp>0) parts.push({label:Math.max(0,G.hearts)+" nyawa sisa", v:hp});
  if(G.endless){ const ez=Math.max(0,G.day-10); if(ez>0) parts.push({label:"Endless +"+ez+" hari", v:ez*0.1}); }
  else if(win) parts.push({label:"Tamat 🏁", v:FINISHBONUS});
  return parts;
}
function scoreMult(win){ return 1 + scoreParts(win).reduce((a,p)=>a+p.v, 0); }
function runScore(win){
  const s=G.stats;
  const bersih=Math.max(0, s.earned - s.stolenAmt);
  return Math.round(bersih * scoreMult(win));
}
/* ============ PAPAN SKOR (top 5, pakai nama) ============
   Dulu cuma nyimpen 1 angka rekor. Sekarang 5 besar + nama pemain.
   v1 = skor berbasis pemasukan. */
const BOARDVER=3, BOARDMAX=5;   // v3 = papan dipisah Kampanye (k) & Endless (e), satuan €
function boardKey(){ return G.endless?"e":"k"; }
function getAllBoards(){
  try{ const o=JSON.parse(localStorage.getItem("bala2_board"));
    if(!o || o.v!==BOARDVER) return {v:BOARDVER,k:[],e:[]};
    return {v:BOARDVER, k:Array.isArray(o.k)?o.k:[], e:Array.isArray(o.e)?o.e:[]};
  }catch(e){ return {v:BOARDVER,k:[],e:[]}; }
}
function getBoard(mode){ const a=getAllBoards(); return a[mode||boardKey()]||[]; }
function saveBoard(list,mode){ const a=getAllBoards(); a[mode||boardKey()]=list.slice(0,BOARDMAX); try{ localStorage.setItem("bala2_board",JSON.stringify(a)); }catch(e){} }
function getName(){ try{ return localStorage.getItem("bala2_name")||""; }catch(e){ return ""; } }
function setName(n){ try{ localStorage.setItem("bala2_name",n); }catch(e){} }
/* masuk 5 besar? kalau papan belum penuh, skor apa pun (>0) masuk */
function masukPapan(score){
  if(score<=0) return false;
  const l=getBoard();
  return l.length<BOARDMAX || score>l[l.length-1].score;
}
/* simpan, balikin peringkatnya (0-based) */
function tambahSkor(name,score,porsi,day,win){
  const e={name:name.slice(0,12),score,porsi,day,win,endless:G.endless,ts:Date.now()};
  const l=getBoard();
  l.push(e);
  l.sort((a,b)=>b.score-a.score || b.porsi-a.porsi);
  saveBoard(l);
  return getBoard().findIndex(x=>x.ts===e.ts);
}
/* rekor lama diturunin dari papan -> gak ada 2 sumber data */
function getBest(){
  const l=getBoard();
  return {
    score: l.length?l[0].score:0,
    porsi: l.reduce((m,e)=>Math.max(m,e.porsi),0),
    day:   l.reduce((m,e)=>Math.max(m,e.day),0),
    win:   l.some(e=>e.win),
    name:  l.length?l[0].name:""
  };
}
function papanHTML(sorotTs){
  const l=getBoard();
  if(!l.length) return `<div class="board"><div class="bEmpty">Belum ada skor. Jadi yang pertama.</div></div>`;
  const medali=["🥇","🥈","🥉","4.","5."];
  return `<div class="board">${l.map((e,i)=>`
    <div class="bRow${e.ts===sorotTs?" me":""}">
      <span class="bPos">${medali[i]||(i+1)+"."}</span>
      <span class="bName">${esc(e.name)}</span>
      <span class="bMeta">${e.endless?"🔥H"+e.day:(e.win?"🏁":"H"+e.day)}</span>
      <b class="bScore">${rupiah(e.score)}</b>
    </div>`).join("")}</div>`;
}
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

/* ============ META (⭐ Bintang, perk permanen, tingkat kesulitan) ============ */
const METAVER=1;
/* perk: id, nama, deskripsi, level maks, biaya tiap level (⭐) */
/* perk: tiap yg dimiliki bisa di-ON/OFF sendiri di Toko Bintang */
const PERKS=[
  {id:"modal", ic:"💶", name:"Modal Awal",     desc:"Mulai tiap main dengan kas ekstra.",      max:3, cost:[3,6,10]},
  {id:"prep",  ic:"🌅", name:"Prep Subuh",      desc:"Buka tiap hari udah ada stok adonan & bala2 siap saji.", max:2, cost:[5,10]},
  {id:"tip",   ic:"⭐", name:"Langganan Setia", desc:"Trinkgeld naik permanen — reputasi bikin royal.", max:2, cost:[6,12]},
  {id:"eagle", ic:"🦅", name:"Mata Elang",      desc:"Maling jalan lebih lambat, gampang ditangkap.", max:1, cost:[7]},
  {id:"thrift",ic:"🤝", name:"Tukang Nawar",    desc:"Semua upgrade di toko lebih murah.",       max:2, cost:[7,13]},
  {id:"life",  ic:"❤️", name:"Nyawa Ekstra",    desc:"Mulai tiap main dengan 1 nyawa tambahan.",  max:1, cost:[10]},

function getMeta(){
  const kosong={v:METAVER,stars:0,maxTier:0,perks:{},life:{}};
  try{ const o=JSON.parse(localStorage.getItem("bala2_meta"));
    if(!o||o.v!==METAVER) return kosong;
    return {v:METAVER,stars:o.stars||0,maxTier:o.maxTier||0,perks:o.perks||{},life:o.life||{}};
  }catch(e){ return kosong; }
}
/* penghitung seumur karier (buat achievement kumulatif) */
function bumpLife(k){ const m=getMeta(); m.life[k]=(m.life[k]||0)+1; saveMeta(m); return m.life[k]; }
function bumpLifeBy(k,n){ const m=getMeta(); m.life[k]=(m.life[k]||0)+n; saveMeta(m); return m.life[k]; }
function campDone(){ return !!getMeta().life.campDone || getBoard("k").some(function(e){return e.win;}); }
function saveMeta(m){ try{ localStorage.setItem("bala2_meta",JSON.stringify({v:METAVER,...m})); }catch(e){} }
/* level yg BENERAN dimiliki (buat tampilan toko) */
function ownedPerk(id){ return getMeta().perks[id]||0; }
/* level EFEKTIF: tiap perk bisa dimatiin sendiri (buat coba tanpa perk tertentu) */
function getPerk(id){ return G.perkOff[id] ? 0 : ownedPerk(id); }
function addStars(n){ const m=getMeta(); m.stars=(m.stars||0)+n; saveMeta(m); }
function unlockTier(t){ const m=getMeta(); if(t>m.maxTier){ m.maxTier=Math.min(2,t); saveMeta(m); return true; } return false; }
/* ⭐ dari satu run: per 20 porsi + bonus tamat, dikali sesuai kesulitan */
function starsFromRun(win){
  const base=Math.floor(G.stats.porsi/35) + (win?3:0);
  const ez=G.endless?Math.max(0,G.day-10):0;              // makin jauh di endless = makin banyak ⭐
  return Math.round(base + ez*0.5);
}
/* Toko Bintang — beli perk permanen. 'back' = tombol kembali. */
function showPerkShop(back){
  const m=getMeta();

      <div class="pCtrl">
        ${owned?`<button class="pOnOff ${off?"off":"on"}" data-tog="${p.id}">${off?"OFF":"ON"}</button>`:""}
        <button class="pBuy" data-id="${p.id}" ${afford?"":"disabled"}>${maxed?"MAX":"⭐ "+cost}</button>
      </div>
    </div>`;
  }).join("");
  $("menuCard").innerHTML=`<h1>⭐ Toko Bintang</h1>
    <div class="starBal">Punya <b>${m.stars} ⭐</b></div>
    <div class="perkHint" style="font-size:11px;color:var(--muted);font-weight:700;text-align:center;margin-bottom:6px">Matiin perk buat coba main tanpa bantuan.</div>
    <div class="perkList">${rows}</div>
    <button class="bigbtn green" id="perkBack">⬅️ Kembali</button>`;
  $("menu").style.display="flex";

  $("menuCard").querySelectorAll(".pOnOff[data-tog]").forEach(b=>b.onclick=()=>{
    const id=b.dataset.tog;
    if(G.perkOff[id]) delete G.perkOff[id]; else G.perkOff[id]=1;

    if(lvl>=p.max) return; const cost=p.cost[lvl];
    if(mm.stars<cost) return;
    mm.stars-=cost; mm.perks[p.id]=lvl+1; saveMeta(mm);
    sfx("coin"); showPerkShop(back);
  });
}

   Kumpulan pencapaian. Kebuka sekali seumur hidup (kesimpen di HP).
   Dipicu dari kejadian nyata di game — bukan angka karangan. */
const ACHVER=1;
const ACHS=[
  {id:"first",   ic:"🐣", name:"Pendatang Baru",    desc:"Layani pembeli pertamamu."},

  {id:"tekstrem",ic:"💀", name:"Sang Legenda",      desc:"Bertahan sampai Hari 25 di Endless."},
];
function getAch(){
  try{ const o=JSON.parse(localStorage.getItem("bala2_ach"));
    if(!o||o.v!==ACHVER||!Array.isArray(o.ids)) return []; return o.ids; }
  catch(e){ return []; }
}
function saveAch(ids){ try{ localStorage.setItem("bala2_ach",JSON.stringify({v:ACHVER,ids})); }catch(e){} }
function hasAch(id){ return getAch().includes(id); }
/* ===== MIGRASI ACHIEVEMENT =====
   Kalau syarat achievement diubah di update, tambahin 1 entri migrasi baru di sini
   dengan id UNIK. Tiap pemain jalanin tiap migrasi PERSIS SEKALI (walau telat update),
   jadi achievement yg syaratnya berubah di-reset biar di-earn ulang secara adil,
   TANPA ngutak-atik yg lain. */
const ACH_MIGRATIONS = [
  { id:"m1_v23", remove:["rich","tips","fuse"] },   // Sultan/Idola Pelanggan/Elektriker ganti syarat
];
function applyAchMigrations(){
  let done; try{ done=JSON.parse(localStorage.getItem("bala2_achmig"))||[]; }catch(e){ done=[]; }
  let ids=getAch(), changed=false;
  ACH_MIGRATIONS.forEach(m=>{
    if(done.includes(m.id)) return;
    if(m.remove) ids=ids.filter(x=>!m.remove.includes(x));
    done.push(m.id); changed=true;
  });
  if(changed){ saveAch(ids); try{ localStorage.setItem("bala2_achmig",JSON.stringify(done)); }catch(e){} }
}
function unlock(id){
  if(hasAch(id)) return;
  const a=ACHS.find(x=>x.id===id); if(!a) return;
  const ids=getAch(); ids.push(id); saveAch(ids);
  achToast(a);
}
/* toast antre — kalau 2 kebuka barengan, gantian munculnya */
let _achQ=[], _achBusy=false;
function achToast(a){ _achQ.push(a); if(!_achBusy) _achNext(); }
function _achNext(){
  const t=$("achToast"); if(!t) return;
  if(!_achQ.length){ _achBusy=false; return; }
  _achBusy=true;
  const a=_achQ.shift();
  t.innerHTML=`<span class="aIc">${a.ic}</span><div><div class="aHd">🏆 ACHIEVEMENT</div><div class="aNm">${esc(a.name)}</div></div>`;
  t.classList.add("show"); sfx("combo");
  setTimeout(()=>{ t.classList.remove("show"); setTimeout(_achNext,380); },2300);
}
function achGridHTML(){
  const un=getAch();
  const grid=ACHS.map(a=>{ const ok=un.includes(a.id);
    return `<div class="achIt${ok?"":" lock"}">
      <span class="aE">${ok?a.ic:"🔒"}</span>
      <span class="aB"><span class="aT">${ok?esc(a.name):"???"}</span>
        <span class="aD">${esc(a.desc)}</span></span></div>`;
  }).join("");

/* dicek pas hari kelar / tamat / kalah */
function checkRunAch(win){
  const s=G.stats;
  // KUMULATIF: tambahin hasil main ini ke total seumur karier, baru dicek
  if(bumpLifeBy("tipsAll", s.tipTotal) >= 1000)  unlock("tips");
  if(bumpLifeBy("earnAll", s.earned)   >= 12000) unlock("rich");
  bumpLife("games"); bumpLifeBy("porsiAll", s.porsi); bumpLifeBy("servedAll", s.served);
  { const mm=getMeta(); if(G.day>(mm.life.maxDay||0)){ mm.life.maxDay=G.day; saveMeta(mm); } }
  // Elektriker: main sampai melewati era mati lampu (hari 9+) dgn total padam < 40 dtk
  if((win || G.day>=9) && s.fuseDown<40) unlock("fuse");
  if(win){
    unlock("finish");
    { const cm=getMeta(); if(!cm.life.campDone){ cm.life.campDone=1; saveMeta(cm); } }
    if(s.burnt===0) unlock("noburn");
    if(s.walkouts===0 && G.livesBought===0) unlock("flawless");   // gak ada pembeli kabur = tanpa cela
  }
  if(G.endless && G.day>=15) unlock("tsulit");    // Endless: bertahan jauh
  if(G.endless && G.day>=25) unlock("tekstrem");
}

function showSettings(back){
  $("menuCard").innerHTML='<h1>⚙️ Setelan</h1>'
    +'<div class="setRow">'
    +'<button class="setBtn '+(G.sfxOn?"on":"off")+'" id="stSfx">'+(G.sfxOn?"🔊":"🔇")+' Suara: <b>'+(G.sfxOn?"ON":"OFF")+'</b></button>'

    +'</div>'
    +'<div class="volRow"><span class="vlbl">🔊 Suara</span><input type="range" class="vol" id="svSfx" min="0" max="100" value="'+Math.round(G.sfxVol*100)+'"><span class="vpct" id="svSfxP">'+Math.round(G.sfxVol*100)+'%</span></div>'
    +'<div class="volRow"><span class="vlbl">🎵 Musik</span><input type="range" class="vol" id="svMus" min="0" max="100" value="'+Math.round(G.musicVol*100)+'"><span class="vpct" id="svMusP">'+Math.round(G.musicVol*100)+'%</span></div>'

    +'<button class="bigbtn green" id="setBack">⬅️ Kembali</button>';
  $("menu").style.display="flex";
  $("setBack").onclick=back;
  $("stSfx").onclick=function(){ G.sfxOn=!G.sfxOn; saveSettings(); sfx("click"); showSettings(back); };
  $("stMus").onclick=function(){ G.musicOn=!G.musicOn; saveSettings(); if(!G.musicOn)stopMusic(); showSettings(back); };
  var vs=$("svSfx"), vm=$("svMus");
  vs.oninput=function(){ G.sfxVol=vs.value/100; $("svSfxP").textContent=vs.value+"%"; applyVol(); };
  vs.onchange=function(){ saveSettings(); sfx("ding"); };
  vm.oninput=function(){ G.musicVol=vm.value/100; $("svMusP").textContent=vm.value+"%"; applyVol(); };
  vm.onchange=function(){ saveSettings(); };
  var rb=$("setReset"), armed=false;
  rb.onclick=function(){ if(!armed){ armed=true; rb.textContent="⚠️ Yakin? Klik lagi buat HAPUS SEMUA"; sfx("burnt"); return; } try{ Object.keys(localStorage).forEach(function(k){ if(k.indexOf("bala2")===0) localStorage.removeItem(k); }); }catch(e){} location.reload(); };
}

/* Tombol yg dipencet jangan nyimpen fokus.
   Kalau enggak: di Windows, abis klik tombol terus tekan Spasi -> tombol itu
   ke-klik lagi (dobel aksi), padahal Spasi harusnya "Goreng Semua". */
["fryAll","collect","makeBatter","reheat","fuseBtn","menuBtn"].forEach(id=>{
  const b=$(id); if(b) b.addEventListener("pointerdown",e=>e.preventDefault());
});
$("fryAll").onclick=fryAll;
$("makeBatter").onclick=openBatter;
$("reheat").onclick=startReheat;
$("fuseBtn").onclick=resetFuse;
$("thiefEl").addEventListener("pointerdown",e=>{ e.preventDefault(); shooThief(); });
document.addEventListener("keydown",e=>{
  if(e.repeat) return;                       // tahan tombol jangan spam
  if(G.batterOpen&&batterStage==="mix"&&e.key===" "){e.preventDefault();tapMix();return;}
  if(!G.running)return;
  const k=e.key.toLowerCase();
  if(e.key===" "||e.code==="Space"){e.preventDefault();fryAll();}
  if(k==="c")collectAll();
  if(k==="p")startReheat();
  if(k==="a")openBatter();
  if(k==="l")resetFuse();
  if(k==="u")shooThief();
});
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){ if(G.paused) resumeGame(); else if(G.running) pauseGame(); }
});
/* HP dikunci / pindah app / ganti tab -> auto jeda.
   Kalau enggak: timer & pembeli tetep jalan di belakang, balik-balik udah kalah. */
document.addEventListener("visibilitychange",()=>{
  if(document.hidden){
    stopMusic();
    if(G.running) pauseGame();
    if(actx && actx.state==="running") actx.suspend();
  }
});
